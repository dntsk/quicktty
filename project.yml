name: QuickTTY
options:
  deploymentTarget:
    macOS: "15.0"
  minimumXcodeGenVersion: 2.45.4
settings:
  base:
    ARCHS: arm64
    ENABLE_APP_SANDBOX: NO
    ENABLE_HARDENED_RUNTIME: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    GENERATE_INFOPLIST_FILE: YES
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    OTHER_SWIFT_FLAGS: "$(inherited) -Xcc -Wno-incomplete-umbrella"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_VERSION: "6.0"
targets:
  QuickTTY:
    type: application
    platform: macOS
    sources:
      - path: QuickTTY
        excludes:
          - Resources
      - path: QuickTTY/Resources
        buildPhase: resources
        group: Resources
      - path: Vendor/ghostty/macos/Sources/Features/Splits/SplitView.swift
      - path: Vendor/ghostty/macos/Sources/Features/Splits/SplitView.Divider.swift
      - path: Vendor/ghostty/macos/Sources/Helpers/Backport.swift
    dependencies:
      - sdk: Carbon.framework
      - framework: Vendor/ghostty/macos/GhosttyKit.xcframework
        embed: false
    postBuildScripts:
      - name: Copy Ghostty Runtime Resources
        script: |
          "$SRCROOT/scripts/copy-ghostty-resources.sh" \
            "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH" \
            "$TARGET_BUILD_DIR/QuickTTY.app/Contents/Resources"
        basedOnDependencyAnalysis: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 2
        INFOPLIST_KEY_CFBundleDisplayName: QuickTTY
        MARKETING_VERSION: 0.1.0
        OTHER_LDFLAGS: "$(inherited) -lstdc++"
        PRODUCT_BUNDLE_IDENTIFIER: com.dntsk.QuickTTY
        PRODUCT_NAME: QuickTTY
  QuickTTYTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: QuickTTYTests
    dependencies:
      - target: QuickTTY
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dntsk.QuickTTYTests
        PRODUCT_NAME: QuickTTYTests
schemes:
  QuickTTY:
    build:
      targets:
        QuickTTY: all
        QuickTTYTests:
          - test
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - QuickTTYTests
